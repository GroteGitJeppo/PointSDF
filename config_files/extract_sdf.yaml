# Config file for SDF extraction and training (3DPotatoTwin dataset)

# Dataset name used for output file: results/samples_dict_<dataset>.npy
dataset: 'Potato'

# 3DPotatoTwin data root (contains 3_pair/tmatrix, 2_sfm, splits.csv, etc.)
root_dir: '/path/to/3DPotatoTwin'
splits_csv: '/path/to/3DPotatoTwin/splits.csv'
# split: 'train'   # optional: which split to extract ('train', 'val', 'test'); omit to extract all

num_samples_on_surface: 10000   # Num samples on object surface
num_samples_in_bbox: 10000    # Num samples within the object bounding box (many points inside the shape)
num_samples_in_volume: 3000   # Num samples within the entire unit volume (many points outside the shape)

# Point cloud settings
pointcloud_size: 2048   # Fixed number of points to store per object (sampled/padded to this size)
use_normals: true       # Estimate surface normals; stores (N, 6) [XYZ + normals] instead of (N, 3)
normal_knn: 30          # Number of nearest neighbours for normal estimation