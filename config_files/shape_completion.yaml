# Config file for shape completion (partial pointcloud -> mesh)

folder_sdf: '17_07_172540'   # Path containing training results, stored in results/runs_sdf
root_dir: '/path/to/3DPotatoTwin'   # 3DPotatoTwin data root (for loading mesh to generate partial pointcloud)
obj_ids: 'sample_id_here'   # sample_id (single id or list; first is used for partial pointcloud)
resolution: 256

# Visible bounding box for shape completion
x_axis_ratio_bbox: 1   # e.g. x_axis_ratio_bbox: 0.5, visible pointcloud in half the object bounding box along the x-axis
y_axis_ratio_bbox: 0.5
z_axis_ratio_bbox: 1

# Normal estimation (must match the use_normals setting used during training)
normal_knn: 30   # Number of neighbours for Open3D normal estimation at inference

# Inference parameters
max_inference_epochs: 300   # Max epochs for latent code refinement (warm-started from encoder)
lr: 0.00001   # Learning rate for latent code refinement
lr_scheduler: True
lr_multiplier: 0.5   # Learning rate multiplier for the scheduler
patience: 50         # Patience for latent code refinement scheduler
sigma_regulariser: 0.01   # Regulariser for the loss function
clamp: True   # Clip the network prediction
clamp_value: 0.1   # Clipping value
